name: Build Docs

on:
  push:
    branches: [main]

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js environment
        uses: actions/setup-node@v6.5.0
        with:
          node-version: 22.22.1
          cache: npm

      - name: Setup npm
        run: npm ci

      - name: Build
        run: npm run docs:build

      - name: Upload
        uses: actions/upload-pages-artifact@v5
        with:
          path: .vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy GitHub Pages site
        id: deployment
        uses: actions/deploy-pages@v3.0.2-node.24
